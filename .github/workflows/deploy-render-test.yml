name: Deploy Render test service

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: render-test-deploy
  cancel-in-progress: true

env:
  RENDER_API_URL: https://api.render.com/v1
  RENDER_PROJECT_NAME: 0xda
  RENDER_TEST_ENVIRONMENT_NAME: Test
  TEST_SERVICE_NAME: 0xda-market-test

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Ensure Render test environment
        shell: bash
        run: bash script/ensure_render_test_environment.sh

      - name: Deploy tested master commit
        shell: bash
        run: |
          set -euo pipefail
          test -n "$RENDER_API_KEY" || { echo "RENDER_API_KEY is missing" >&2; exit 1; }

          services_json="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "$RENDER_API_URL/services?name=$TEST_SERVICE_NAME&limit=20")"
          matches="$(jq --arg name "$TEST_SERVICE_NAME" \
            '[.[] | .service | select(.name == $name)]' <<<"$services_json")"
          match_count="$(jq 'length' <<<"$matches")"

          if [[ "$match_count" == "0" ]]; then
            echo "Render test service is not provisioned yet; skipping deploy."
            exit 0
          fi
          if [[ "$match_count" != "1" ]]; then
            echo "Expected one Render service named '$TEST_SERVICE_NAME'; found $match_count." >&2
            exit 1
          fi

          service_id="$(jq -r '.[0].id' <<<"$matches")"
          service_slug="$(jq -r '.[0].slug' <<<"$matches")"
          request_body="$(jq -n --arg commit_id "$COMMIT_SHA" '{commitId: $commit_id}')"
          deploy_json="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Content-Type: application/json" \
            --data "$request_body" \
            "$RENDER_API_URL/services/$service_id/deploys")"
          deploy_id="$(jq -er '.id' <<<"$deploy_json")"

          deploy_status=""
          for _ in {1..90}; do
            deploy_json="$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              "$RENDER_API_URL/services/$service_id/deploys/$deploy_id")"
            deploy_status="$(jq -r '.status' <<<"$deploy_json")"
            case "$deploy_status" in
              live) break ;;
              build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                echo "Render deploy failed with status: $deploy_status" >&2
                exit 1
                ;;
            esac
            sleep 10
          done

          if [[ "$deploy_status" != "live" ]]; then
            echo "Timed out waiting for Render deploy; last status: $deploy_status" >&2
            exit 1
          fi

          health_url="https://$service_slug.onrender.com/health"
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            "$health_url" > /dev/null

          public_api_token="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            "$RENDER_API_URL/services/$service_id/env-vars/PUBLIC_API_TOKEN" \
            | jq -er '.value')"
          manual_provider_token="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            "$RENDER_API_URL/services/$service_id/env-vars/MANUAL_PROVIDER_TOKEN" \
            | jq -er '.value')"
          echo "::add-mask::$public_api_token"
          echo "::add-mask::$manual_provider_token"

          base_url="https://$service_slug.onrender.com"
          curl --fail --silent --show-error \
            --header "Authorization: Bearer $public_api_token" \
            "$base_url/v1/users?status=active" > /dev/null
          curl --fail --silent --show-error \
            --header "Authorization: Bearer $manual_provider_token" \
            "$base_url/operator/v1/tasks?status=pending" > /dev/null

          {
            echo "## Render test deploy"
            echo
            echo "- Commit: \`$COMMIT_SHA\`"
            echo "- URL: $health_url"
            echo "- Deploy: \`$deploy_id\`"
            echo "- Status: \`live\`"
            echo "- Smoke tests: \`public API + operator API passed\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Point dedicated Telegram bots at test
        shell: bash
        run: |
          set -euo pipefail

          find_service() {
            local name="$1"
            local services_json
            local matches
            local match_count

            services_json="$(curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Accept: application/json" \
              "$RENDER_API_URL/services?name=$name&limit=20")"
            matches="$(jq --arg name "$name" \
              '[.[] | .service | select(.name == $name)]' <<<"$services_json")"
            match_count="$(jq 'length' <<<"$matches")"
            if [[ "$match_count" != "1" ]]; then
              echo "Expected one Render service named '$name'; found $match_count." >&2
              exit 1
            fi

            jq -c '.[0]' <<<"$matches"
          }

          read_env() {
            local service_id="$1"
            local key="$2"

            curl --fail-with-body --silent --show-error \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              "$RENDER_API_URL/services/$service_id/env-vars/$key" \
              | jq -er '.value'
          }

          put_env() {
            local service_id="$1"
            local key="$2"
            local value="$3"
            local body

            body="$(jq -n --arg value "$value" '{value: $value}')"
            curl --fail-with-body --silent --show-error \
              --request PUT \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Content-Type: application/json" \
              --data "$body" \
              "$RENDER_API_URL/services/$service_id/env-vars/$key" \
              > /dev/null
          }

          deploy_and_wait() {
            local service_id="$1"
            local service_name="$2"
            local request_body
            local deploy_json
            local deploy_id
            local deploy_status=""

            request_body='{"clearCache":"do_not_clear"}'
            deploy_json="$(curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer $RENDER_API_KEY" \
              --header "Content-Type: application/json" \
              --data "$request_body" \
              "$RENDER_API_URL/services/$service_id/deploys")"
            deploy_id="$(jq -er '.id' <<<"$deploy_json")"

            for _ in {1..90}; do
              deploy_json="$(curl --fail-with-body --silent --show-error \
                --header "Authorization: Bearer $RENDER_API_KEY" \
                "$RENDER_API_URL/services/$service_id/deploys/$deploy_id")"
              deploy_status="$(jq -r '.status' <<<"$deploy_json")"
              case "$deploy_status" in
                live) break ;;
                build_failed|update_failed|pre_deploy_failed|canceled|deactivated)
                  echo "Render deploy for '$service_name' failed with status: $deploy_status" >&2
                  exit 1
                  ;;
              esac
              sleep 10
            done

            if [[ "$deploy_status" != "live" ]]; then
              echo "Timed out waiting for '$service_name'; last status: $deploy_status" >&2
              exit 1
            fi

            echo "$deploy_id"
          }

          verify_webhook() {
            local telegram_token="$1"
            local expected_url="$2"
            local response
            local actual_url

            response="$(curl --fail-with-body --silent --show-error \
              --retry 12 \
              --retry-delay 5 \
              --retry-all-errors \
              "https://api.telegram.org/bot$telegram_token/getWebhookInfo")"
            jq -e '.ok == true' <<<"$response" > /dev/null
            actual_url="$(jq -r '.result.url' <<<"$response")"
            if [[ "$actual_url" != "$expected_url" ]]; then
              echo "Telegram webhook mismatch: expected '$expected_url', got '$actual_url'." >&2
              exit 1
            fi
          }

          core_service="$(find_service "$TEST_SERVICE_NAME")"
          core_service_id="$(jq -r '.id' <<<"$core_service")"
          core_slug="$(jq -r '.slug' <<<"$core_service")"
          test_api_url="https://$core_slug.onrender.com"
          public_api_token="$(read_env "$core_service_id" PUBLIC_API_TOKEN)"
          manual_provider_token="$(read_env "$core_service_id" MANUAL_PROVIDER_TOKEN)"
          echo "::add-mask::$public_api_token"
          echo "::add-mask::$manual_provider_token"

          client_service="$(find_service 0xda-market-client-bot)"
          client_service_id="$(jq -r '.id' <<<"$client_service")"
          client_slug="$(jq -r '.slug' <<<"$client_service")"
          client_telegram_token="$(read_env "$client_service_id" TELEGRAM_BOT_TOKEN)"
          echo "::add-mask::$client_telegram_token"
          put_env "$client_service_id" MARKET_API_URL "$test_api_url"
          put_env "$client_service_id" MARKET_API_TOKEN "$public_api_token"
          client_deploy_id="$(deploy_and_wait "$client_service_id" 0xda-market-client-bot)"
          curl --fail --silent --show-error \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            "https://$client_slug.onrender.com/health" > /dev/null
          verify_webhook \
            "$client_telegram_token" \
            "https://$client_slug.onrender.com/telegram/webhook"

          broker_service="$(find_service 0xda-market-broker-bot)"
          broker_service_id="$(jq -r '.id' <<<"$broker_service")"
          broker_slug="$(jq -r '.slug' <<<"$broker_service")"
          broker_telegram_token="$(read_env "$broker_service_id" TELEGRAM_BOT_TOKEN)"
          echo "::add-mask::$broker_telegram_token"
          put_env "$broker_service_id" MARKET_API_URL "$test_api_url"
          put_env "$broker_service_id" MARKET_OPERATOR_TOKEN "$manual_provider_token"
          broker_deploy_id="$(deploy_and_wait "$broker_service_id" 0xda-market-broker-bot)"
          verify_webhook \
            "$broker_telegram_token" \
            "https://$broker_slug.onrender.com/telegram/webhook"

          {
            echo
            echo "## Telegram bots"
            echo
            echo "- Environment: \`test\`"
            echo "- Market API: $test_api_url"
            echo "- Client bot deploy: \`$client_deploy_id\`"
            echo "- Broker bot deploy: \`$broker_deploy_id\`"
            echo "- Webhooks: \`verified\`"
          } >> "$GITHUB_STEP_SUMMARY"

name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - 'release*'

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.11"
          bundler-cache: true
      - run: bundle exec rake

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/zero_x_da_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zero_x_da_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d zero_x_da_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.11"
          bundler-cache: true
      - run: bundle exec rake
      - name: Validate operational scripts
        run: |
          ruby -c bin/bootstrap_admin
          bash -n deploy/vps/bootstrap-ubuntu.sh
          bash -n deploy/vps/deploy.sh
          bash -n deploy/vps/switch-environment.sh
          bash test/vps_switch_test.sh

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag 0xda-market:test .

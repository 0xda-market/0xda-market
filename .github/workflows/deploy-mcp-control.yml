name: Deploy mcp-control to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/deploy-mcp-control.yml

permissions:
  contents: read
  issues: write

concurrency:
  group: mcp-control-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: development
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_PORT: 22022

    steps:
      - name: Validate deployment configuration
        run: |
          set -Eeuo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"

      - name: Check out mcp-control
        uses: actions/checkout@v4
        with:
          repository: 0x0sky/mcp-control
          ref: master
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Validate and build
        run: |
          set -Eeuo pipefail
          test -z "$(gofmt -l .)"
          go vet ./...
          go test -count=1 ./...
          make single

          source_sha="$(git rev-parse HEAD)"
          echo "SOURCE_SHA=$source_sha" >>"$GITHUB_ENV"
          cp bin/mcp-control "/tmp/mcp-control-$source_sha"
          digest="$(sha256sum "/tmp/mcp-control-$source_sha" | awk '{print $1}')"
          printf '%s  %s\n' "$digest" "mcp-control-$source_sha" \
            >"/tmp/mcp-control-$source_sha.sha256"

      - name: Configure SSH
        run: |
          set -Eeuo pipefail
          install -m 0700 -d "$HOME/.ssh"
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" >"$HOME/.ssh/id_ed25519"
          chmod 0600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" >>"$HOME/.ssh/known_hosts"

      - name: Verify host prerequisites
        run: |
          set -Eeuo pipefail
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" 'bash -s' <<'REMOTE'
          set -Eeuo pipefail
          [[ "$(uname -m)" == "x86_64" ]]
          command -v systemctl >/dev/null
          command -v curl >/dev/null
          command -v ss >/dev/null

          if sudo -n true 2>/dev/null; then
            echo "root method: sudo"
          else
            command -v docker >/dev/null
            docker info >/dev/null
            echo "root method: existing Docker trust"
          fi
          REMOTE

      - name: Upload verified binary
        run: |
          set -Eeuo pipefail
          scp -P "$VPS_PORT" \
            "/tmp/mcp-control-$SOURCE_SHA" \
            "/tmp/mcp-control-$SOURCE_SHA.sha256" \
            "$VPS_USER@$VPS_HOST:/tmp/"

      - name: Install privately and smoke test
        id: deploy
        run: |
          set -Eeuo pipefail
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "SOURCE_SHA='$SOURCE_SHA' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          binary="/tmp/mcp-control-$SOURCE_SHA"
          checksum="/tmp/mcp-control-$SOURCE_SHA.sha256"
          root_script=/tmp/mcp-control-root-deploy.sh
          cleanup() {
            rm -f "$binary" "$checksum" "$root_script"
          }
          trap cleanup EXIT

          cd /tmp
          sha256sum -c "$(basename "$checksum")"
          chmod 0755 "$binary"
          "$binary" doctor

          cat >"$root_script" <<'ROOT'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          binary="/tmp/mcp-control-$SOURCE_SHA"

          # Pre-create a loopback-only gateway config. The installer preserves
          # existing configs, so port 8443 is never exposed on a public bind.
          install -d -m 0750 /etc/mcp-control
          cat >/etc/mcp-control/gateway.json <<'JSON'
          {
            "apiVersion": "mcp-control.dev/v1alpha1",
            "kind": "GatewayConfig",
            "listen": {
              "addr": "127.0.0.1:8443",
              "tlsCertFile": "/etc/mcp-control/tls/gateway.crt",
              "tlsKeyFile": "/etc/mcp-control/tls/gateway.key"
            },
            "agent": {
              "socket": "/run/mcp-control/agent.sock"
            },
            "auth": {
              "bearerTokenFile": "/etc/mcp-control/gateway.token"
            }
          }
          JSON
          chmod 0640 /etc/mcp-control/gateway.json

          "$binary" install --dry-run
          "$binary" install

          # v1alpha1 preserves files but does not yet normalize ownership for
          # its unprivileged service account. Apply the least-privilege modes
          # required by the shipped systemd units.
          chown root:mcp-control /etc/mcp-control /etc/mcp-control/tls
          chmod 0750 /etc/mcp-control /etc/mcp-control/tls
          chown root:mcp-control \
            /etc/mcp-control/agent.json \
            /etc/mcp-control/gateway.json \
            /etc/mcp-control/gateway.token \
            /etc/mcp-control/tls/gateway.crt \
            /etc/mcp-control/tls/gateway.key
          chmod 0640 \
            /etc/mcp-control/agent.json \
            /etc/mcp-control/gateway.json \
            /etc/mcp-control/gateway.token \
            /etc/mcp-control/tls/gateway.key
          chmod 0644 /etc/mcp-control/tls/gateway.crt

          systemctl restart mcp-control-agent mcp-control-gateway

          for _ in $(seq 1 30); do
            if systemctl is-active --quiet mcp-control-agent && \
               systemctl is-active --quiet mcp-control-gateway; then
              break
            fi
            sleep 1
          done

          systemctl is-active --quiet mcp-control-agent || {
            journalctl -u mcp-control-agent --no-pager -n 100
            exit 1
          }
          systemctl is-active --quiet mcp-control-gateway || {
            journalctl -u mcp-control-gateway --no-pager -n 100
            exit 1
          }

          test -S /run/mcp-control/agent.sock
          listening="$(ss -ltnH 'sport = :8443')"
          printf '%s\n' "$listening"
          grep -q '127.0.0.1:8443' <<<"$listening"
          if grep -Eq '(^|[[:space:]])(0\.0\.0\.0|\*|\[::\]|:::):8443' <<<"$listening"; then
            echo "gateway is publicly bound" >&2
            exit 1
          fi

          curl --fail --silent --show-error --insecure \
            https://127.0.0.1:8443/healthz >/dev/null
          token="$(cat /etc/mcp-control/gateway.token)"
          curl --fail --silent --show-error --insecure \
            -H "Authorization: Bearer $token" \
            https://127.0.0.1:8443/v1/host >/dev/null
          curl --fail --silent --show-error --insecure \
            -H "Authorization: Bearer $token" \
            https://127.0.0.1:8443/v1/units >/dev/null

          install -d -m 0750 -o root -g mcp-control /var/lib/mcp-control
          printf '{"sourceSha":"%s","bind":"127.0.0.1:8443","deployedAt":"%s"}\n' \
            "$SOURCE_SHA" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            >/var/lib/mcp-control/deployment.json
          chown root:mcp-control /var/lib/mcp-control/deployment.json
          chmod 0640 /var/lib/mcp-control/deployment.json

          /usr/local/bin/mcp-control version
          echo "mcp-control private VPS deployment is healthy"
          ROOT
          chmod 0700 "$root_script"

          if sudo -n true 2>/dev/null; then
            sudo -n env SOURCE_SHA="$SOURCE_SHA" /bin/bash "$root_script"
          else
            # The existing deploy account is intentionally in the Docker group,
            # which already grants root-equivalent host control. Enter PID 1's
            # namespaces only for this reviewed installer script.
            docker run --rm \
              --privileged \
              --pid=host \
              --network=host \
              -e SOURCE_SHA="$SOURCE_SHA" \
              alpine:3.20 \
              sh -ec 'apk add --no-cache util-linux >/dev/null; exec nsenter -t 1 -m -u -i -n -p -r -w -- /usr/bin/env SOURCE_SHA="$SOURCE_SHA" /bin/bash /tmp/mcp-control-root-deploy.sh'
          fi

          curl --fail --silent --show-error --insecure \
            https://127.0.0.1:8443/healthz >/dev/null
          listening="$(ss -ltnH 'sport = :8443')"
          grep -q '127.0.0.1:8443' <<<"$listening"
          echo "verified from deploy account: loopback-only and healthy"
          REMOTE

      - name: Report deployment result
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOY_STATUS: ${{ job.status }}
          DEPLOY_SOURCE_SHA: ${{ env.SOURCE_SHA }}
        with:
          script: |
            const ok = process.env.DEPLOY_STATUS === 'success';
            const icon = ok ? '✅' : '❌';
            const source = process.env.DEPLOY_SOURCE_SHA || 'not resolved';
            const runURL = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `${icon} **mcp-control private VPS deployment: ${process.env.DEPLOY_STATUS}**`,
              '',
              `- source: \`0x0sky/mcp-control@${source}\``,
              '- target bind: `127.0.0.1:8443`',
              `- workflow: [run ${context.runId}](${runURL})`,
              '',
              ok
                ? 'Both systemd services, the Unix socket, loopback bind, `/healthz`, `/v1/host`, and `/v1/units` passed.'
                : 'The workflow failed closed. Review the linked run; no public `8443` bind is accepted.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 50,
              body
            });

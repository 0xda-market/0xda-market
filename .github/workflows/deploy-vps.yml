name: Deploy API to VPS

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: vps-api-development
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: development
    env:
      DEPLOY_ENV: development
      FORCE_ACTIVATE: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      VPS_PORT: 22022
      VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/opt/0xda-market' }}
      VPS_RUNTIME_PATH: /opt/0xda-market-runtime
      RELEASE_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
      MCP_CONTROL_REF: 2f9766ea6993716d2d79ad91a4ce40f18baa44ef

    steps:
      - name: Validate deployment configuration
        run: |
          set -Eeuo pipefail
          test "$DEPLOY_ENV" = development
          case "$FORCE_ACTIVATE" in 0|1) ;; *) exit 1 ;; esac
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_PRIVATE_KEY"
          test -n "$VPS_DEPLOY_PATH"
          test -n "$RELEASE_SHA"
          test -n "$MCP_CONTROL_REF"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_SHA }}

      - name: Check out pinned mcp-control
        uses: actions/checkout@v4
        with:
          repository: 0x0sky/mcp-control
          ref: ${{ env.MCP_CONTROL_REF }}
          path: .deps/mcp-control
          persist-credentials: false

      - name: Set up Go for mcp-control
        uses: actions/setup-go@v5
        with:
          go-version-file: .deps/mcp-control/go.mod
          cache: false

      - name: Build pinned mcp-control
        run: |
          set -Eeuo pipefail
          install -d -m 0755 deploy/vps/mcp-control/bin
          (
            cd .deps/mcp-control
            go test ./...
            for arch in amd64 arm64; do
              CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
                go build \
                  -trimpath \
                  -ldflags="-s -w -X github.com/0x0sky/mcp-control/internal/cli.Version=$MCP_CONTROL_REF" \
                  -o "$GITHUB_WORKSPACE/deploy/vps/mcp-control/bin/mcp-control-$arch" \
                  ./cmd/mcp-control
            done
          )
          chmod 0755 deploy/vps/mcp-control/bin/mcp-control-*

      - name: Configure SSH
        run: |
          set -Eeuo pipefail
          install -m 0700 -d "$HOME/.ssh"

          key_path="$HOME/.ssh/id_ed25519"
          known_hosts_path="$HOME/.ssh/known_hosts"
          keyscan_output="$HOME/.ssh/known_hosts.pending"
          keyscan_error="$HOME/.ssh/ssh-keyscan.error"

          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" >"$key_path"
          chmod 0600 "$key_path"

          if ! ssh-keygen -y -f "$key_path" >/dev/null; then
            echo "::error::VPS_SSH_PRIVATE_KEY is not a valid OpenSSH private key"
            exit 1
          fi

          for attempt in 1 2 3 4 5; do
            if ssh-keyscan -T 5 -p "$VPS_PORT" -H "$VPS_HOST" \
              >"$keyscan_output" 2>"$keyscan_error" && [[ -s "$keyscan_output" ]]; then
              sort -u "$keyscan_output" >"$known_hosts_path"
              chmod 0600 "$known_hosts_path"
              break
            fi

            if [[ "$attempt" -eq 5 ]]; then
              cat "$keyscan_error" >&2 || true
              echo "::error::Cannot reach the configured VPS SSH endpoint on TCP ${VPS_PORT}. Ensure sshd is listening and every provider/UFW firewall allows the port."
              exit 1
            fi

            sleep $((attempt * 2))
          done

      - name: Upload release
        run: |
          set -Eeuo pipefail
          archive="/tmp/0xda-market-${DEPLOY_ENV}-${RELEASE_SHA}.tar.gz"
          tar --exclude=.git --exclude='.deps' --exclude='deploy/vps/.env' -czf "$archive" .
          scp -P "$VPS_PORT" "$archive" "$VPS_USER@$VPS_HOST:/tmp/"

      - name: Stage or activate development
        run: |
          set -Eeuo pipefail
          ssh -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "DEPLOY_PATH='$VPS_DEPLOY_PATH' RUNTIME_PATH='$VPS_RUNTIME_PATH' DEPLOY_ENV='$DEPLOY_ENV' FORCE_ACTIVATE='$FORCE_ACTIVATE' RELEASE_SHA='$RELEASE_SHA' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          environment_root="$DEPLOY_PATH/environments/$DEPLOY_ENV"
          archive="/tmp/0xda-market-${DEPLOY_ENV}-${RELEASE_SHA}.tar.gz"
          release_dir="$environment_root/releases/$RELEASE_SHA"
          shared_env="$environment_root/shared/.env"
          current_link="$environment_root/current"
          active_environment=""
          previous_release="$(readlink -f "$current_link" 2>/dev/null || true)"

          test -f "$shared_env"
          grep -qx "DEPLOY_ENV=$DEPLOY_ENV" "$shared_env"
          case "$FORCE_ACTIVATE" in 0|1) ;; *) exit 1 ;; esac

          rm -rf "$release_dir"
          mkdir -p "$release_dir"
          tar -xzf "$archive" -C "$release_dir"
          rm -f "$archive"
          ln -sfn "$shared_env" "$release_dir/deploy/vps/.env"

          if [[ -f "$RUNTIME_PATH/active-environment" ]]; then
            active_environment="$(<"$RUNTIME_PATH/active-environment")"
          fi

          if [[ "$FORCE_ACTIVATE" == "1" || "$active_environment" == "$DEPLOY_ENV" ]]; then
            if ! DEPLOY_MODE=activate bash "$release_dir/deploy/vps/deploy.sh"; then
              if [[ -n "$previous_release" && -d "$previous_release/deploy/vps" ]]; then
                DEPLOY_MODE=activate bash "$previous_release/deploy/vps/deploy.sh" || true
              fi
              exit 1
            fi
          else
            DEPLOY_MODE=stage bash "$release_dir/deploy/vps/deploy.sh"
          fi

          ln -sfn "$release_dir" "$current_link"

          find "$environment_root/releases" \
            -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -nr | tail -n +4 | cut -d' ' -f2- | xargs -r rm -rf
          REMOTE

      - name: Publish VPS deployment status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOY_STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
        run: |
          set -Eeuo pipefail
          description="three-workload VPS deployment failed"
          if [[ "$DEPLOY_STATE" == "success" ]]; then
            description="core, bot, and mcp-control are healthy"
          fi
          payload="$(jq -nc \
            --arg state "$DEPLOY_STATE" \
            --arg context "deploy/vps-stack-development" \
            --arg description "$description" \
            --arg target_url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            '{state:$state,context:$context,description:$description,target_url:$target_url}')"
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${RELEASE_SHA}" \
            --data "$payload"

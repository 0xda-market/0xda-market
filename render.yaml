services:
  - type: web
    name: 0xda-market
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 30
    envVars:
      - key: RACK_ENV
        value: production
      - key: PUBLIC_API_TOKEN
        sync: false
      - key: MANUAL_PROVIDER_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_CLIENT_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BROKER_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_BASE_URL
        value: https://zeroxda-market.onrender.com

name: zero-x-da-market-${DEPLOY_ENV}

services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - .env
    expose:
      - "10000"
    networks:
      - edge
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  edge:

volumes:
  caddy_data:
    name: zero-x-da-market-caddy-data
  caddy_config:
    name: zero-x-da-market-caddy-config

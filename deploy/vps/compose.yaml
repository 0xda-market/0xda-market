name: zero-x-da-market-${DEPLOY_ENV}

services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    env_file:
      - .env
    expose:
      - "10000"
    ports:
      - "127.0.0.1:10000:10000"
    networks:
      - edge
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mcp-control:
    image: alpine:3.22
    restart: unless-stopped
    init: true
    network_mode: host
    user: "65532:65532"
    depends_on:
      api:
        condition: service_healthy
    command:
      - /opt/mcp-control/mcp-control
      - agent
      - --config
      - /etc/mcp-control/agent.json
    volumes:
      - ./mcp-control/bin/mcp-control:/opt/mcp-control/mcp-control:ro
      - ./mcp-control/config:/etc/mcp-control:ro
    tmpfs:
      - /run/mcp-control:rw,noexec,nosuid,nodev,size=1m,mode=0750,uid=65532,gid=65532
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777,uid=65532,gid=65532
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 10s
    healthcheck:
      test:
        - CMD
        - /opt/mcp-control/mcp-control
        - servers
        - list
        - --config
        - /etc/mcp-control/agent.json
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN}
      MIND_WEB_DOMAIN: ${MIND_WEB_DOMAIN:-mind.nilx.one}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  edge:
    name: ${MARKET_EDGE_NETWORK:-zero-x-da-market-edge}
    external: true

volumes:
  caddy_data:
    name: zero-x-da-market-caddy-data
  caddy_config:
    name: zero-x-da-market-caddy-config
